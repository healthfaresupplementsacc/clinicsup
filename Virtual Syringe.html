<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Syringe</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f5f5f0;
    margin: 0;
    padding: 24px;
    color: #1a1a1a;
  }
  .container {
    max-width: 1500px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    margin: 0 0 1.5rem;
  }
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 1rem;
    padding: 0 4px;
  }
  .label {
    font-size: 14px;
    color: #6a6a6e;
  }
  .divider {
    flex: 1;
    height: 1px;
    background: rgba(0,0,0,0.12);
  }
  .readout {
    font-size: 14px;
  }
  .readout .value {
    font-weight: 500;
    margin-left: 6px;
  }
  button {
    font-size: 13px;
    padding: 6px 14px;
    background: white;
    border: 0.5px solid rgba(0,0,0,0.25);
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
  }
  button:hover {
    background: #f0f0ec;
  }
  button:active {
    transform: scale(0.98);
  }
  svg {
    width: 100%;
    height: auto;
    user-select: none;
    touch-action: none;
    max-width: 100%;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Interactive insulin syringe</h1>
  <div class="controls">
    <div class="label">Drag the plunger</div>
    <div class="divider"></div>
    <div class="readout">
      <span class="label">Filled:</span>
      <span class="value" id="readout">10 units</span>
    </div>
    <button id="reset-btn">Reset</button>
  </div>

  <svg id="syr" viewBox="0 0 1600 460" xmlns="http://www.w3.org/2000/svg" role="img">
    <title>Interactive insulin syringe</title>
    <desc>Drag the plunger horizontally to fill or empty the red liquid in the barrel</desc>

    <line x1="20" y1="230" x2="120" y2="230" stroke="#3a3a3e" stroke-width="3" stroke-linecap="round"/>
    <polygon points="20,230 38,225 38,235" fill="#2a2a2e"/>
    <line x1="20" y1="230" x2="75" y2="230" stroke="#a8a8ac" stroke-width="1.2"/>

    <rect x="115" y="225" width="20" height="10" fill="#9a9a9e" stroke="#5a5a5e" stroke-width="0.7"/>

    <path d="M 135 215 L 250 195 L 250 265 L 135 245 Z" fill="#fafbfc" stroke="#5a5a5e" stroke-width="1.3"/>
    <path d="M 135 215 L 250 195 L 250 215 L 135 225 Z" fill="#ffffff" opacity="0.5"/>

    <rect x="250" y="190" width="900" height="80" fill="#fafbfc" stroke="#5a5a5e" stroke-width="1.3"/>

    <rect id="liquid" x="250" y="191" width="90" height="78" fill="#e89a92"/>

    <g stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round">
      <line x1="250" y1="195" x2="250" y2="222" stroke-width="1.7"/>
      <line x1="268" y1="200" x2="268" y2="217"/>
      <line x1="286" y1="200" x2="286" y2="217"/>
      <line x1="304" y1="200" x2="304" y2="217"/>
      <line x1="322" y1="200" x2="322" y2="217"/>
      <line x1="340" y1="195" x2="340" y2="222" stroke-width="1.7"/>
      <line x1="358" y1="200" x2="358" y2="217"/>
      <line x1="376" y1="200" x2="376" y2="217"/>
      <line x1="394" y1="200" x2="394" y2="217"/>
      <line x1="412" y1="200" x2="412" y2="217"/>
      <line x1="430" y1="195" x2="430" y2="222" stroke-width="1.7"/>
      <line x1="448" y1="200" x2="448" y2="217"/>
      <line x1="466" y1="200" x2="466" y2="217"/>
      <line x1="484" y1="200" x2="484" y2="217"/>
      <line x1="502" y1="200" x2="502" y2="217"/>
      <line x1="520" y1="195" x2="520" y2="222" stroke-width="1.7"/>
      <line x1="538" y1="200" x2="538" y2="217"/>
      <line x1="556" y1="200" x2="556" y2="217"/>
      <line x1="574" y1="200" x2="574" y2="217"/>
      <line x1="592" y1="200" x2="592" y2="217"/>
      <line x1="610" y1="195" x2="610" y2="222" stroke-width="1.7"/>
      <line x1="628" y1="200" x2="628" y2="217"/>
      <line x1="646" y1="200" x2="646" y2="217"/>
      <line x1="664" y1="200" x2="664" y2="217"/>
      <line x1="682" y1="200" x2="682" y2="217"/>
      <line x1="700" y1="195" x2="700" y2="222" stroke-width="1.7"/>
      <line x1="718" y1="200" x2="718" y2="217"/>
      <line x1="736" y1="200" x2="736" y2="217"/>
      <line x1="754" y1="200" x2="754" y2="217"/>
      <line x1="772" y1="200" x2="772" y2="217"/>
      <line x1="790" y1="195" x2="790" y2="222" stroke-width="1.7"/>
      <line x1="808" y1="200" x2="808" y2="217"/>
      <line x1="826" y1="200" x2="826" y2="217"/>
      <line x1="844" y1="200" x2="844" y2="217"/>
      <line x1="862" y1="200" x2="862" y2="217"/>
      <line x1="880" y1="195" x2="880" y2="222" stroke-width="1.7"/>
      <line x1="898" y1="200" x2="898" y2="217"/>
      <line x1="916" y1="200" x2="916" y2="217"/>
      <line x1="934" y1="200" x2="934" y2="217"/>
      <line x1="952" y1="200" x2="952" y2="217"/>
      <line x1="970" y1="195" x2="970" y2="222" stroke-width="1.7"/>
      <line x1="988" y1="200" x2="988" y2="217"/>
      <line x1="1006" y1="200" x2="1006" y2="217"/>
      <line x1="1024" y1="200" x2="1024" y2="217"/>
      <line x1="1042" y1="200" x2="1042" y2="217"/>
      <line x1="1060" y1="195" x2="1060" y2="222" stroke-width="1.7"/>
      <line x1="1078" y1="200" x2="1078" y2="217"/>
      <line x1="1096" y1="200" x2="1096" y2="217"/>
      <line x1="1114" y1="200" x2="1114" y2="217"/>
      <line x1="1132" y1="200" x2="1132" y2="217"/>
      <line x1="1150" y1="195" x2="1150" y2="222" stroke-width="1.7"/>
    </g>

    <g font-family="Arial, sans-serif" font-size="22" font-weight="500" fill="#1a1a1a" text-anchor="middle">
      <text x="340" y="248">10</text>
      <text x="430" y="248">20</text>
      <text x="520" y="248">30</text>
      <text x="610" y="248">40</text>
      <text x="700" y="248">50</text>
      <text x="790" y="248">60</text>
      <text x="880" y="248">70</text>
      <text x="970" y="248">80</text>
      <text x="1060" y="248">90</text>
      <text x="1150" y="248">100</text>
    </g>
    <text x="1185" y="252" font-family="Arial, sans-serif" font-size="16" fill="#1a1a1a">Units</text>

    <path d="M 1150 160 L 1175 160 L 1175 300 L 1150 300 Z" fill="#dcdde0" stroke="#5a5a5e" stroke-width="1.3"/>
    <ellipse cx="1162" cy="230" rx="9" ry="68" fill="#eaebed" stroke="#5a5a5e" stroke-width="1"/>

    <g id="plunger-system" style="cursor: grab;">
      <rect id="rod" x="272" y="208" width="1100" height="44" fill="#eaebed" stroke="#7a7a7e" stroke-width="0.9"/>
      <line id="rod-line" x1="272" y1="230" x2="1372" y2="230" stroke="#9a9a9e" stroke-width="0.7"/>

      <rect id="stopper" x="250" y="190" width="44" height="80" fill="#1a1a1a"/>
      <rect id="stopper-top" x="250" y="190" width="44" height="10" fill="#3a3a3a"/>
      <rect id="stopper-bot" x="250" y="260" width="44" height="10" fill="#0a0a0a"/>

      <ellipse id="cap-1" cx="1366" cy="230" rx="15" ry="74" fill="#dcdde0" stroke="#5a5a5e" stroke-width="1.3"/>
      <path id="cap-2" d="M 1357 154 L 1382 154 L 1390 165 L 1390 295 L 1382 306 L 1357 306 Z" fill="#dcdde0" stroke="#5a5a5e" stroke-width="1.3"/>
      <ellipse id="cap-3" cx="1390" cy="230" rx="9" ry="74" fill="#c8c9cc" stroke="#5a5a5e" stroke-width="1"/>

      <rect id="hit" x="1345" y="140" width="80" height="180" fill="transparent"/>
    </g>
  </svg>
</div>

<script>
(function(){
  const svg = document.getElementById('syr');
  const liquid = document.getElementById('liquid');
  const stopper = document.getElementById('stopper');
  const stopperTop = document.getElementById('stopper-top');
  const stopperBot = document.getElementById('stopper-bot');
  const rod = document.getElementById('rod');
  const rodLine = document.getElementById('rod-line');
  const cap1 = document.getElementById('cap-1');
  const cap2 = document.getElementById('cap-2');
  const cap3 = document.getElementById('cap-3');
  const hit = document.getElementById('hit');
  const plungerSystem = document.getElementById('plunger-system');
  const readout = document.getElementById('readout');
  const resetBtn = document.getElementById('reset-btn');

  const X_MIN = 250;
  const X_MAX = 1150;
  const PX_PER_UNIT = (X_MAX - X_MIN) / 100;
  const STOPPER_W = 44;
  const ROD_BASE_END_X = 1372;

  let units = 10;
  let dragging = false;
  let dragOffset = 0;

  function render() {
    units = Math.max(0, Math.min(100, units));
    const stopperX = X_MIN + units * PX_PER_UNIT;
    const fillW = stopperX - X_MIN;

    liquid.setAttribute('width', fillW);
    stopper.setAttribute('x', stopperX);
    stopperTop.setAttribute('x', stopperX);
    stopperBot.setAttribute('x', stopperX);

    const baseStopperX = 340;
    const dx = stopperX - baseStopperX;

    const rodStartX = stopperX + STOPPER_W - 22;
    const rodEndX = ROD_BASE_END_X + dx;
    const rodW = rodEndX - rodStartX;
    rod.setAttribute('x', rodStartX);
    rod.setAttribute('width', Math.max(0, rodW));
    rodLine.setAttribute('x1', rodStartX);
    rodLine.setAttribute('x2', rodEndX);

    cap1.setAttribute('transform', `translate(${dx},0)`);
    cap2.setAttribute('transform', `translate(${dx},0)`);
    cap3.setAttribute('transform', `translate(${dx},0)`);
    hit.setAttribute('transform', `translate(${dx},0)`);

    readout.textContent = Math.round(units) + ' units';
  }

  function clientToSvgX(clientX) {
    const pt = svg.createSVGPoint();
    pt.x = clientX;
    pt.y = 0;
    const ctm = svg.getScreenCTM();
    if (!ctm) return 0;
    return pt.matrixTransform(ctm.inverse()).x;
  }

  function startDrag(e) {
    dragging = true;
    plungerSystem.style.cursor = 'grabbing';
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const svgX = clientToSvgX(cx);
    const stopperX = X_MIN + units * PX_PER_UNIT;
    dragOffset = svgX - stopperX;
    e.preventDefault();
  }

  function moveDrag(e) {
    if (!dragging) return;
    const cx = e.touches ? e.touches[0].clientX : e.clientX;
    const svgX = clientToSvgX(cx);
    const stopperX = svgX - dragOffset;
    units = (stopperX - X_MIN) / PX_PER_UNIT;
    render();
    e.preventDefault();
  }

  function endDrag() {
    dragging = false;
    plungerSystem.style.cursor = 'grab';
  }

  hit.addEventListener('mousedown', startDrag);
  window.addEventListener('mousemove', moveDrag);
  window.addEventListener('mouseup', endDrag);
  hit.addEventListener('touchstart', startDrag, { passive: false });
  window.addEventListener('touchmove', moveDrag, { passive: false });
  window.addEventListener('touchend', endDrag);

  resetBtn.addEventListener('click', () => {
    units = 10;
    render();
  });

  render();
})();
</script>
</body>
</html>
